<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Title & Description -->
  <title>Sidefold — Organize your YouTube subscriptions</title>
  <meta name="description" content="Sidefold adds folders and feed filtering directly inside YouTube. No clutter, no learning curve — it just works." />
  <meta name="theme-color" content="#3B82F6" />

  <!-- Open Graph -->
  <meta property="og:title" content="Sidefold — Organize your YouTube subscriptions" />
  <meta property="og:description" content="Sidefold adds folders and feed filtering directly inside YouTube. No clutter, no learning curve — it just works." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://sidefold.com" />
  <meta property="og:image" content="/assets/screenshots/1.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Sidefold — Organize your YouTube subscriptions" />
  <meta name="twitter:description" content="Sidefold adds folders and feed filtering directly inside YouTube. No clutter, no learning curve — it just works." />
  <meta name="twitter:image" content="/assets/screenshots/1.png" />

  <!-- Icons & Manifest -->
  <link rel="icon" href="/assets/logo-sidefold.png" type="image/png" />
  <link rel="apple-touch-icon" href="/assets/logo-sidefold.png" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://chromewebstore.google.com" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <!-- Register Service Worker for PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(err => {
        console.log('Service Worker registration failed:', err);
      });
    }
  </script>
</body>
</html>
